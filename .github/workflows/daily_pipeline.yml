name: RemoteOK Daily Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level (DEBUG / INFO / WARNING)"
        required: false
        default: "INFO"

concurrency:
  group: remoteok-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    name: Fetch & Store RemoteOK Jobs
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      LOG_LEVEL:    ${{ github.event.inputs.log_level || 'INFO' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RemoteOK pipeline
        run: |
          echo "Starting pipeline at $(date -u)"
          python -m src.main
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## RemoteOK Pipeline Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
